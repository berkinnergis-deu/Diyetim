<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">

<title>Diyetim</title>
<style>
:root{--bg:#FFF8F0;--bg2:#FFF1E6;--bg3:#FFE8D6;--surface:#FFF;--text:#1C1917;--text2:#57534E;--text3:#A8A29E;--primary:#C4572A;--primary-soft:#C4572A18;--primary-med:#C4572A30;--green:#3D7A4A;--green-soft:#3D7A4A18;--amber:#B45309;--amber-soft:#B4530918;--red:#C4572A;--red-soft:#C4572A18;--blue:#2563EB;--blue-soft:#2563EB18;--cyan:#0891B2;--cyan-soft:#0891B220;--border:#E7DDD3;--shadow:0 1px 3px rgba(0,0,0,.06);--radius:14px;--radius-sm:8px;--tab-h:64px;--header-h:56px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
[data-theme="dark"]{--bg:#0F0E0D;--bg2:#1A1918;--bg3:#252321;--surface:#1E1D1B;--text:#F5F0EB;--text2:#A8A29E;--text3:#6B6560;--primary:#E8845C;--primary-soft:#E8845C20;--primary-med:#E8845C35;--green:#6BBF73;--green-soft:#6BBF7320;--amber:#F59E0B;--amber-soft:#F59E0B20;--red:#EF4444;--red-soft:#EF444420;--blue:#60A5FA;--blue-soft:#60A5FA20;--cyan:#22D3EE;--cyan-soft:#22D3EE20;--border:#2E2C2A;--shadow:0 1px 3px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,textarea{font-family:inherit}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;overflow:hidden}
.header{height:var(--header-h);min-height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-top:var(--safe-t);background:var(--surface);border-bottom:1px solid var(--border);z-index:50;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;color:var(--primary)}.header-sub{font-size:11px;color:var(--text3);font-weight:600}
.plan-info{display:none;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--primary-soft);border-bottom:1px solid var(--primary-med);font-size:12px;font-weight:700;color:var(--primary);flex-shrink:0}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-bar{height:calc(var(--tab-h)+var(--safe-b));min-height:calc(var(--tab-h)+var(--safe-b));padding-bottom:var(--safe-b);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:700;color:var(--text3)}.tab-btn.active{color:var(--primary)}.tab-btn svg{width:22px;height:22px}
.view{display:none}.view.active{display:block}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 2px}
.week-nav-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:18px;font-weight:800}
.week-nav-btn:active{background:var(--primary-soft);color:var(--primary)}
.week-nav-center{text-align:center}.week-nav-label{font-size:13px;font-weight:800;color:var(--text)}
.week-nav-today{font-size:10px;font-weight:700;color:var(--primary);cursor:pointer;padding:2px 8px;border-radius:99px;background:var(--primary-soft);display:inline-block;margin-top:2px}
.day-strip{display:flex;gap:6px;padding:8px 16px 12px;overflow-x:auto;scrollbar-width:none}.day-strip::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;width:50px;height:54px;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--surface);border:2px solid var(--border);font-weight:700;font-size:11px;color:var(--text2)}
.day-chip span:first-child{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase}
.day-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}.day-chip.active span:first-child{color:rgba(255,255,255,.8)}
.day-chip.today:not(.active){box-shadow:0 0 0 2px var(--primary)}
.day-chip.filled::after{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-top:1px}.day-chip.active.filled::after{background:rgba(255,255,255,.7)}
.slots-container{padding:0 12px 16px;display:flex;flex-direction:column;gap:10px}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slot-label{font-size:12px;font-weight:800;text-transform:uppercase;color:var(--text3);letter-spacing:.5px}.slot-time{font-size:11px;color:var(--text3)}
.slot-assigned{background:var(--green-soft);border:1px solid var(--green);border-radius:var(--radius-sm);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.slot-assigned-name{font-weight:700;font-size:14px;color:var(--green)}
.slot-empty{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text3);font-weight:700;font-size:13px;cursor:pointer}
.slot-empty:active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.slot-remove{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:18px;font-weight:800}
.note-area{width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:12px;line-height:1.4;resize:none;min-height:32px;max-height:80px}
.note-area::placeholder{color:var(--text3)}.note-area:focus{outline:none;border-color:var(--primary)}
.note-display{margin-top:6px;padding:6px 10px;background:var(--amber-soft);border-radius:var(--radius-sm);font-size:12px;color:var(--amber);font-style:italic;cursor:pointer}
.extra-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--blue-soft);border:1px solid var(--blue);border-radius:var(--radius-sm);margin-top:4px;font-size:12px}
.extra-item-name{font-weight:700;color:var(--blue)}.extra-item-info{font-size:11px;color:var(--text2)}
.extra-remove{color:var(--red);font-weight:800;font-size:16px;padding:4px 8px}
.add-extra-btn{display:flex;align-items:center;gap:4px;margin-top:6px;padding:6px 10px;border:1px dashed var(--blue);border-radius:var(--radius-sm);font-size:11px;font-weight:700;color:var(--blue);cursor:pointer}
.water-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.water-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.water-label{font-size:12px;font-weight:800;text-transform:uppercase;color:var(--cyan)}.water-total{font-size:20px;font-weight:800;color:var(--cyan)}.water-total span{font-size:13px;font-weight:600;color:var(--text2)}
.water-btns{display:flex;gap:6px;flex-wrap:wrap}
.water-btn{flex:1;min-width:70px;padding:10px 6px;background:var(--cyan-soft);border:1px solid var(--cyan);border-radius:var(--radius-sm);font-size:12px;font-weight:700;color:var(--cyan);text-align:center}
.water-btn:active{transform:scale(.95);background:var(--cyan);color:#fff}
.water-btn-sub{font-size:10px;font-weight:600;color:var(--text3);display:block;margin-top:1px}
.water-log{margin-top:8px}.water-log-item{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}.water-log-item:last-child{border-bottom:none}
.water-undo{color:var(--red);font-weight:800;font-size:14px;padding:4px 8px;cursor:pointer}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:80dvh;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;padding-bottom:var(--safe-b)}.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-title{padding:12px 20px 8px;font-size:16px;font-weight:800;flex-shrink:0}
.sheet-body{overflow-y:auto;padding:0 16px 20px;-webkit-overflow-scrolling:touch}
.option-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}.option-card:active{transform:scale(.98)}.option-card.disabled{opacity:.35;pointer-events:none}
.option-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.option-name{font-weight:700;font-size:15px}
.option-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--primary-soft);color:var(--primary)}.option-badge.zero{background:var(--red-soft);color:var(--red)}
.option-ingredients{font-size:12px;color:var(--text2);line-height:1.5}
.option-macros{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.macro-pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--surface)}.macro-pill.kcal{color:var(--primary)}.macro-pill.p{color:var(--blue)}.macro-pill.c{color:var(--amber)}.macro-pill.f{color:var(--red)}
.nutr-day-header{padding:16px 16px 8px;font-size:14px;font-weight:800;color:var(--text2)}
.nutr-totals{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 12px 8px}
.nutr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}.nutr-card.wide{grid-column:span 2}
.nutr-val{font-size:28px;font-weight:800;letter-spacing:-1px}.nutr-val.kcal{color:var(--primary)}.nutr-val.p{color:var(--blue)}.nutr-val.c{color:var(--amber)}.nutr-val.f{color:var(--red)}.nutr-val.fi{color:var(--green)}
.nutr-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-top:2px}
.week-summary{padding:12px}.week-summary-title{font-size:14px;font-weight:800;color:var(--text2);margin-bottom:8px;padding:0 4px}
.ws-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.ws-label{font-size:13px;font-weight:700}.ws-val{font-size:13px;font-weight:800}
.freq-overview{padding:0 12px 12px}.freq-slot-title{font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;padding:8px 4px 4px}
.freq-row{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:13px}
.freq-dots{display:flex;gap:3px}.freq-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border)}.freq-dot.used{background:var(--green);border-color:var(--green)}.freq-name{font-weight:600;color:var(--text2);flex:1}
.settings-section{padding:16px}.settings-section h2{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--text2)}
.import-area{width:100%;min-height:100px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:12px;font-size:13px;color:var(--text);resize:vertical;font-family:'Courier New',monospace}.import-area:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;min-height:48px}
.btn-primary{background:var(--primary);color:#fff;width:100%}.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);width:100%}
.btn-danger{background:var(--red-soft);color:var(--red);width:100%}.btn-sm{min-height:36px;padding:8px 14px;font-size:12px}.btn+.btn{margin-top:8px}
.msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:12px}.msg-ok{background:var(--green-soft);color:var(--green)}.msg-err{background:var(--red-soft);color:var(--red)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px}.empty-title{font-size:18px;font-weight:800;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--text2);line-height:1.5;max-width:280px}.empty-desc a{color:var(--primary);text-decoration:underline;cursor:pointer}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}.toggle-row:last-child{border-bottom:none}.toggle-label{font-size:14px;font-weight:700}
.toggle{width:48px;height:28px;background:var(--bg3);border-radius:14px;position:relative;transition:background .2s;cursor:pointer}.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}.toggle.on::after{transform:translateX(20px)}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 12px 8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.history-item:active{background:var(--bg2)}
.hist-week{font-weight:700;font-size:14px}.hist-detail{font-size:12px;color:var(--text2)}.hist-arrow{color:var(--text3);font-size:18px}
.slot-note-hint{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}
.saved-extra{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer}.saved-extra:active{background:var(--blue-soft);border-color:var(--blue)}
.saved-extra-name{font-weight:700;font-size:13px}.saved-extra-info{font-size:11px;color:var(--text2)}
.supp-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.supp-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;min-height:30px;border:1.5px solid;-webkit-tap-highlight-color:transparent}
.supp-chip.taken{opacity:.55;text-decoration:line-through}
.supp-chip svg{width:13px;height:13px;flex-shrink:0}
.supp-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800}
.supp-settings-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.supp-settings-item .supp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.supp-settings-name{font-weight:700;font-size:13px}.supp-settings-detail{font-size:11px;color:var(--text3);margin-top:1px}
.supp-settings-actions{display:flex;gap:2px}.supp-settings-actions button{padding:6px;color:var(--text3);font-size:14px;font-weight:800}
.supp-form{margin-top:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.supp-form label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:3px;margin-top:8px}
.supp-form label:first-child{margin-top:0}
.supp-form input,.supp-form select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
.supp-form input:focus,.supp-form select:focus{outline:none;border-color:var(--primary)}
.supp-form-row{display:flex;gap:8px}
.supp-form-btns{display:flex;gap:8px;margin-top:12px}
@media(min-width:640px){.app{max-width:480px;margin:0 auto}}
</style>
</head>

<button class="tab-btn" onclick="goTab('settings')" data-tab="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg><span>Ayarlar</span></button>
</nav>
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-title" id="sheetTitle"></div><div class="sheet-body" id="sheetBody"></div></div>
</div>
<script>
// ═══ CONSTANTS ═══
var DAYS=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
var DAY_FULL=['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
var MON=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
var WATER_OPTS=[{label:'1 Bardak',sub:'200 ml',ml:200},{label:'1 Şişe',sub:'500 ml',ml:500},{label:'1 Büyük',sub:'750 ml',ml:750},{label:'1 Litre',sub:'1000 ml',ml:1000}];

// ═══ DATE HELPERS (ISO Monday-based week) ═══
function getMondayOfWeek(d){var c=new Date(d.getFullYear(),d.getMonth(),d.getDate());c.setDate(c.getDate()-(c.getDay()+6)%7);return c}
function makeWeekKey(d){var m=getMondayOfWeek(d);return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0')}
function parseWK(wk){var p=wk.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function shiftWK(wk,n){var d=parseWK(wk);d.setDate(d.getDate()+n*7);return makeWeekKey(d)}
function weekDates(wk){var m=parseWK(wk),r=[];for(var i=0;i<7;i++){var d=new Date(m);d.setDate(m.getDate()+i);r.push(d)}return r}
function todayIdx(){return(new Date().getDay()+6)%7}
function todayWK(){return makeWeekKey(new Date())}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function weekLabel(wk){var ds=weekDates(wk);return ds[0].getDate()+' '+MON[ds[0].getMonth()]+' – '+ds[6].getDate()+' '+MON[ds[6].getMonth()]}

// ═══ STATE ═══
var S={plan:null,weeks:{},savedExtras:[],history:[],wk:todayWK(),day:todayIdx(),tab:'planner'};

// ═══ SUPPLEMENT STATE ═══
var DEFAULT_SUPPS=[
{id:'b12',name:'B12',dose:1,unit:'tablet',slotId:'ilk-ogun',note:'Methylcobalamin, sabah yemekle'},
{id:'omega3',name:'Omega-3',dose:1,unit:'kapsül',slotId:'aksam',note:'Yağlı öğünle — emilim için'},
{id:'mag-sabah',name:'Magnesium',dose:1,unit:'kapsül',slotId:'ilk-ogun',note:'D3 aktivasyonu için sabah dozu'},
{id:'mag-aksam',name:'Magnesium',dose:2,unit:'kapsül',slotId:'gece-atistirma',note:'Uyku desteği — son öğün'},
{id:'vitc-sabah',name:'Vitamin C',dose:1,unit:'tablet',slotId:'ilk-ogun',note:'~200mg/doz emilim tavanı'},
{id:'vitc-aksam',name:'Vitamin C',dose:1,unit:'tablet',slotId:'aksam',note:'İkinci doz — akşam yemeğiyle'},
{id:'vitd3',name:'D3+K2',dose:1,unit:'damla',slotId:'ilk-ogun',note:'Yağlı yemekle — K2 eşlemesi zorunlu'},
{id:'ashwagandha',name:'Ashwagandha',dose:1,unit:'kapsül',slotId:'gece-atistirma',note:'Kortizol regülasyonu'},
{id:'turmeric',name:'Turmeric',dose:1,unit:'kapsül',slotId:'aksam',note:'Kurkumin — yağla emilim'}
];
var SUPP_COLORS={B12:'#DC2658','Omega-3':'#0891B2',Magnesium:'#7C3AED','Vitamin C':'#F59E0B','D3+K2':'#F97316',Ashwagandha:'#3D7A4A',Turmeric:'#CA8A04'};
function suppColor(name){return SUPP_COLORS[name]||'var(--text3)'}
var suppState={supps:null,checked:{}}; // checked keyed by dateKey: {dateKey:{suppId:true}}
function dateKeyForDay(dayIdx){var ds=weekDates(S.wk);var d=ds[dayIdx];return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayDateKey(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function getSupps(){if(!suppState.supps)suppState.supps=JSON.parse(JSON.stringify(DEFAULT_SUPPS));return suppState.supps}
function suppsBySlot(slotId){return getSupps().filter(function(s){return s.slotId===slotId})}
function isSuppTaken(suppId,dayIdx){var dk=dateKeyForDay(dayIdx);return!!(suppState.checked[dk]&&suppState.checked[dk][suppId])}
function toggleSupp(suppId,dayIdx){var dk=dateKeyForDay(dayIdx);if(!suppState.checked[dk])suppState.checked[dk]={};suppState.checked[dk][suppId]=!suppState.checked[dk][suppId];saveSupps();render()}
function suppSummary(dayIdx){var supps=getSupps(),dk=dateKeyForDay(dayIdx),taken=0;supps.forEach(function(s){if(suppState.checked[dk]&&suppState.checked[dk][s.id])taken++});return{taken:taken,total:supps.length}}

// ═══ WEEK DATA ACCESSOR ═══
function W(){if(!S.weeks[S.wk])S.weeks[S.wk]={a:{},n:{},x:{},w:{}};return S.weeks[S.wk]}

// ═══ STORAGE ═══
function saveSupps(){try{localStorage.setItem('dy_supps',JSON.stringify(suppState.supps));localStorage.setItem('dy_sc',JSON.stringify(suppState.checked))}catch(e){}}
function loadSupps(){try{var s=localStorage.getItem('dy_supps');if(s)suppState.supps=JSON.parse(s);var c=localStorage.getItem('dy_sc');if(c)suppState.checked=JSON.parse(c)}catch(e){}}
function save(){try{localStorage.setItem('dy_p',JSON.stringify(S.plan));localStorage.setItem('dy_w',JSON.stringify(S.weeks));localStorage.setItem('dy_se',JSON.stringify(S.savedExtras));localStorage.setItem('dy_h',JSON.stringify(S.history));saveSupps()}catch(e){}}
function load(){try{
  var p=localStorage.getItem('dy_p');if(p)S.plan=JSON.parse(p);
  var w=localStorage.getItem('dy_w');if(w)S.weeks=JSON.parse(w);
  var se=localStorage.getItem('dy_se');if(se)S.savedExtras=JSON.parse(se);
  var h=localStorage.getItem('dy_h');if(h)S.history=JSON.parse(h);
  var dk=localStorage.getItem('dy_dk');if(dk)document.body.dataset.theme=dk==='1'?'dark':'light';
  // MIGRATION from old format
  var oldA=localStorage.getItem('diyetim_assign');
  if(oldA){var tk=todayWK();S.weeks[tk]={a:JSON.parse(oldA),n:JSON.parse(localStorage.getItem('diyetim_notes')||'{}'),x:JSON.parse(localStorage.getItem('diyetim_extras')||'{}'),w:JSON.parse(localStorage.getItem('diyetim_water')||'{}')};
  var op=localStorage.getItem('diyetim_plan');if(op&&!S.plan)S.plan=JSON.parse(op);
  var ose=localStorage.getItem('diyetim_savedExtras');if(ose)S.savedExtras=JSON.parse(ose);
  var oh=localStorage.getItem('diyetim_history');if(oh)S.history=JSON.parse(oh);
  ['diyetim_assign','diyetim_notes','diyetim_extras','diyetim_water','diyetim_plan','diyetim_savedExtras','diyetim_history','diyetim_selDay','diyetim_dark'].forEach(function(k){localStorage.removeItem(k)});save()}
  updateDarkToggle();
  loadSupps();
}catch(e){console.error(e)}}

// ═══ FREQUENCY LOGIC ═══
function usedCount(id){var c=0,a=W().a;for(var k in a)if(a[k]===id)c++;return c}
function slotUsed(sid){var c=0,a=W().a;for(var k in a)if(k.indexOf('-'+sid)>-1&&a[k])c++;return c}
function remaining(o){return o.maxPerWeek-usedCount(o.id)}
function canUse(o,sid,d){var k=d+'-'+sid,a=W().a;if(a[k]===o.id)return true;if(remaining(o)<=0)return false;var sl=S.plan&&S.plan.slots.find(function(x){return x.id===sid});if(sl&&sl.slotMaxPerWeek&&slotUsed(sid)>=sl.slotMaxPerWeek&&!a[k])return false;return true}
function extraNutr(d,sid){var arr=W().x[d+'-'+sid]||[];return arr.reduce(function(t,e){return{kcal:t.kcal+(e.kcal||0),protein:t.protein+(e.protein||0),carb:t.carb+(e.carb||0),fat:t.fat+(e.fat||0),fiber:t.fiber+(e.fiber||0)}},{kcal:0,protein:0,carb:0,fat:0,fiber:0})}
function dayNutr(d){var n={kcal:0,protein:0,carb:0,fat:0,fiber:0};if(!S.plan)return n;var a=W().a;S.plan.slots.forEach(function(sl){var k=d+'-'+sl.id,oid=a[k];if(oid){var o=sl.options.find(function(x){return x.id===oid});if(o&&o.nutrition){n.kcal+=o.nutrition.kcal||0;n.protein+=o.nutrition.protein||0;n.carb+=o.nutrition.carb||0;n.fat+=o.nutrition.fat||0;n.fiber+=o.nutrition.fiber||0}}var en=extraNutr(d,sl.id);n.kcal+=en.kcal;n.protein+=en.protein;n.carb+=en.carb;n.fat+=en.fat;n.fiber+=en.fiber});return n}
function dayWater(d){return(W().w[d]||[]).reduce(function(s,e){return s+e.ml},0)}
function weekNutr(){var t={kcal:0,protein:0,carb:0,fat:0,fiber:0},f=0;for(var d=0;d<7;d++){var dn=dayNutr(d);if(dn.kcal>0)f++;t.kcal+=dn.kcal;t.protein+=dn.protein;t.carb+=dn.carb;t.fat+=dn.fat;t.fiber+=dn.fiber}var avg=f?{kcal:Math.round(t.kcal/f),protein:Math.round(t.protein/f),carb:Math.round(t.carb/f),fat:Math.round(t.fat/f),fiber:Math.round(t.fiber/f)}:{kcal:0,protein:0,carb:0,fat:0,fiber:0};return{totals:t,filled:f,avg:avg}}
function dayFilled(d){if(!S.plan)return 0;var a=W().a;return S.plan.slots.filter(function(s){return!!a[d+'-'+s.id]}).length}

// ═══ TAB NAVIGATION ═══
function goTab(t){S.tab=t;document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});document.getElementById('view-'+t).classList.add('active');document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===t)});document.getElementById('mainScroll').scrollTop=0;render()}

// ═══ RENDERING ═══
function render(){renderHeader();if(S.tab==='planner')renderPlanner();if(S.tab==='nutrition')renderNutrition();if(S.tab==='history')renderHistory();if(S.tab==='settings'){renderSavedExtras();renderSuppSettings()}}
function renderHeader(){var sub=document.getElementById('headerSub'),pi=document.getElementById('planInfo');if(S.plan){sub.textContent=S.plan.dietitian||'Plan yüklendi';pi.style.display='flex';document.getElementById('planInfoText').textContent=S.plan.dietitian||'';document.getElementById('planInfoWeek').textContent=weekLabel(S.wk)}else{sub.textContent='Plan yüklenmedi';pi.style.display='none'}}

function htmlWeekNav(){var isNow=S.wk===todayWK();return '<div class="week-nav"><button class="week-nav-btn" onclick="changeWeek(-1)">‹</button><div class="week-nav-center"><div class="week-nav-label">'+weekLabel(S.wk)+'</div>'+(isNow?'':'<span class="week-nav-today" onclick="goToday()">Bugüne Dön</span>')+'</div><button class="week-nav-btn" onclick="changeWeek(1)">›</button></div>'}

function htmlDayStrip(){var dates=weekDates(S.wk),now=new Date(),h='<div class="day-strip">';for(var d=0;d<7;d++){var isActive=d===S.day,isToday=sameDay(dates[d],now),filled=dayFilled(d)>0;h+='<button class="day-chip'+(isActive?' active':'')+(isToday?' today':'')+(filled?' filled':'')+'" onclick="selDay('+d+')"><span>'+DAYS[d]+'</span><span>'+dates[d].getDate()+'</span></button>'}return h+'</div>'}

function renderPlanner(){var el=document.getElementById('plannerContent');if(!S.plan){el.innerHTML='<div class="empty-state"><div class="empty-icon">🥗</div><div class="empty-title">Henüz plan yüklenmedi</div><div class="empty-desc"><a onclick="goTab(\'settings\')">Ayarlar</a> sekmesinden plan yükleyin.</div></div>';return}
var d=S.day,wk=W(),ss=suppSummary(d),ssColor=ss.taken>=ss.total?'var(--green)':ss.taken>0?'var(--amber)':'var(--text3)';
var h=htmlWeekNav()+htmlDayStrip();
// Supplement daily badge
h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px"><span style="font-size:12px;font-weight:700;color:var(--text2)">'+DAY_FULL[d]+'</span><div class="supp-badge" style="background:'+ssColor+'18;color:'+ssColor+'">💊 '+ss.taken+'/'+ss.total+'</div></div>';
h+='<div class="slots-container">';
// Water
var wml=dayWater(d);h+='<div class="water-section"><div class="water-header"><span class="water-label">💧 Su Takibi</span><span class="water-total">'+(wml/1000).toFixed(1)+'<span> L</span></span></div><div class="water-btns">';
WATER_OPTS.forEach(function(wo){h+='<button class="water-btn" onclick="addWater('+d+','+wo.ml+')"><span>'+wo.label+'</span><span class="water-btn-sub">'+wo.sub+'</span></button>'});
h+='</div>';var wlog=wk.w[d]||[];if(wlog.length){h+='<div class="water-log">';for(var i=wlog.length-1;i>=0;i--)h+='<div class="water-log-item"><span>'+wlog[i].time+' — '+wlog[i].ml+' ml</span><button class="water-undo" onclick="rmWater('+d+','+i+')">×</button></div>';h+='</div>'}h+='</div>';
// Slots
S.plan.slots.forEach(function(sl){var key=d+'-'+sl.id,aid=wk.a[key],aopt=aid?sl.options.find(function(o){return o.id===aid}):null,note=wk.n[key]||'',extras=wk.x[key]||[];
h+='<div class="slot-card"><div class="slot-header"><span class="slot-label">'+esc(sl.label)+'</span><span class="slot-time">'+esc(sl.time||'')+'</span></div>';
if(aopt){var n=aopt.nutrition;h+='<div class="slot-assigned" onclick="openSheet(\''+sl.id+'\')"><div><div class="slot-assigned-name">'+esc(aopt.name)+'</div><div style="font-size:12px;color:var(--text2);margin-top:2px">'+(n?n.kcal:'-')+' kcal · P'+(n?n.protein:0)+' K'+(n?n.carb:0)+' Y'+(n?n.fat:0)+'</div></div><button class="slot-remove" onclick="event.stopPropagation();unassign(\''+key+'\')">×</button></div>'}
else{h+='<div class="slot-empty" onclick="openSheet(\''+sl.id+'\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Seçenek Ata</div>'}
// Supplement chips inside slot card
var slSupps=suppsBySlot(sl.id);
if(slSupps.length){h+='<div class="supp-row">';slSupps.forEach(function(sp){var taken=isSuppTaken(sp.id,d),col=suppColor(sp.name);h+='<button class="supp-chip'+(taken?' taken':'')+'" onclick="toggleSupp(\''+sp.id+'\','+d+')" style="color:'+col+';border-color:'+(taken?col:col+'40')+';background:'+(taken?col+'30':col+'15')+'" title="'+esc(sp.note||'')+'">'+(taken?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 1.5L3 9a5.66 5.66 0 0 0 8 8l7.5-7.5a5.66 5.66 0 0 0-8-8z"/><line x1="8" y1="16" x2="16" y2="8" opacity="0.4"/></svg>')+'<span>'+esc(sp.name)+'</span>'+(sp.dose>1?'<span style="opacity:.7">×'+sp.dose+'</span>':'')+'</button>'});h+='</div>'}
if(extras.length){h+='<div>';for(var i=0;i<extras.length;i++){var e=extras[i];h+='<div class="extra-item"><div><span class="extra-item-name">'+esc(e.name)+'</span><br><span class="extra-item-info">'+e.kcal+' kcal · P'+(e.protein||0)+' K'+(e.carb||0)+' Y'+(e.fat||0)+'</span></div><button class="extra-remove" onclick="rmExtra(\''+key+'\','+i+')">×</button></div>'}h+='</div>'}
h+='<div class="add-extra-btn" onclick="openExtraSheet(\''+key+'\')">+ Ekstra yiyecek ekle</div>';
if(note){h+='<div class="note-display" onclick="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';this.nextElementSibling.focus()">📝 '+esc(note)+'</div><textarea class="note-area" style="display:none" placeholder="Not ekle..." onblur="saveNote(\''+key+'\',this.value)" oninput="autoGrow(this)">'+esc(note)+'</textarea>'}
else{h+='<textarea class="note-area" placeholder="Not ekle... (ör: bu öğün beni açıktırdı)" onblur="saveNote(\''+key+'\',this.value)" oninput="autoGrow(this)"></textarea>'}
h+='</div>'});h+='</div>';
// Freq
h+='<div class="freq-overview"><div class="freq-slot-title" style="padding-top:4px">Haftalık Kullanım</div>';
S.plan.slots.forEach(function(sl){h+='<div class="freq-slot-title">'+esc(sl.label)+'</div>';sl.options.forEach(function(o){var u=usedCount(o.id);h+='<div class="freq-row"><span class="freq-name">'+esc(o.name)+'</span><div class="freq-dots">';for(var i=0;i<o.maxPerWeek;i++)h+='<div class="freq-dot'+(i<u?' used':'')+'"></div>';h+='</div></div>'})});h+='</div>';
el.innerHTML=h}

function renderNutrition(){var el=document.getElementById('nutritionContent');if(!S.plan){el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Plan yükleyin</div></div>';return}
var d=S.day,dn=dayNutr(d),wn=weekNutr(),wml=dayWater(d),wk=W();
var h=htmlWeekNav()+htmlDayStrip()+'<div class="nutr-day-header">'+DAY_FULL[d]+' — Günlük Özet</div><div class="nutr-totals">';
h+=nc('kcal',dn.kcal,'kcal','Kalori',1)+nc('p',dn.protein,'g','Protein')+nc('c',dn.carb,'g','Karbonhidrat')+nc('f',dn.fat,'g','Yağ')+nc('fi',dn.fiber,'g','Lif');
h+='<div class="nutr-card"><div class="nutr-val" style="color:var(--cyan)">'+(wml/1000).toFixed(1)+'<span style="font-size:14px;font-weight:600"> L</span></div><div class="nutr-label">Su</div></div></div>';
h+='<div class="week-summary"><div class="week-summary-title">Haftalık Özet ('+wn.filled+'/7 gün)</div>';
[['Toplam Kalori',wn.totals.kcal+' kcal'],['Ort. Kalori/Gün',wn.avg.kcal+' kcal'],['Ort. Protein',wn.avg.protein+' g'],['Ort. Karbonhidrat',wn.avg.carb+' g'],['Ort. Yağ',wn.avg.fat+' g'],['Ort. Lif',wn.avg.fiber+' g']].forEach(function(r){h+='<div class="ws-row"><span class="ws-label">'+r[0]+'</span><span class="ws-val">'+r[1]+'</span></div>'});
h+='</div><div class="week-summary"><div class="week-summary-title">'+DAY_FULL[d]+' — Öğün Detayları</div>';
S.plan.slots.forEach(function(sl){var key=d+'-'+sl.id,oid=wk.a[key],opt=oid?sl.options.find(function(o){return o.id===oid}):null,en=extraNutr(d,sl.id),tk=(opt&&opt.nutrition?opt.nutrition.kcal:0)+en.kcal,extras=wk.x[key]||[];var det=opt?esc(opt.name):'—';if(extras.length)det+=' + '+extras.map(function(e){return esc(e.name)}).join(', ');
h+='<div class="ws-row"><div><span class="ws-label">'+esc(sl.label)+'</span><br><span style="font-size:11px;color:var(--text3)">'+det+'</span></div><span class="ws-val">'+(tk?tk+' kcal':'—')+'</span></div>'});
h+='</div>';el.innerHTML=h}
function nc(c,v,u,l,w){return '<div class="nutr-card'+(w?' wide':'')+'"><div class="nutr-val '+c+'">'+v+'<span style="font-size:14px;font-weight:600"> '+u+'</span></div><div class="nutr-label">'+l+'</div></div>'}

function renderHistory(){var el=document.getElementById('historyContent');if(!S.history.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Geçmiş boş</div></div>';return}
var h='<div style="padding:12px 0 4px 16px;font-size:14px;font-weight:800;color:var(--text2)">Arşiv</div>';
for(var i=S.history.length-1;i>=0;i--){var x=S.history[i];h+='<div class="history-item" onclick="loadHist('+i+')"><div><div class="hist-week">'+esc(x.week||'')+'</div><div class="hist-detail">'+esc(x.dietitian||'')+' · '+Object.keys(x.a||{}).length+' öğün</div></div><span class="hist-arrow">›</span></div>'}
h+='<div class="settings-section"><button class="btn btn-danger" onclick="clearHist()">Geçmişi Temizle</button></div>';el.innerHTML=h}
function renderSavedExtras(){var el=document.getElementById('savedExtrasList');if(!el)return;if(!S.savedExtras.length){el.innerHTML='<p style="font-size:12px;color:var(--text3)">Henüz kayıtlı ekstra yok.</p>';return}
var h='';S.savedExtras.forEach(function(e,i){h+='<div class="saved-extra"><div><span class="saved-extra-name">'+esc(e.name)+'</span><br><span class="saved-extra-info">'+e.kcal+' kcal · P'+(e.protein||0)+' K'+(e.carb||0)+' Y'+(e.fat||0)+'</span></div><button class="extra-remove" onclick="event.stopPropagation();rmSavedExtra('+i+')">×</button></div>'});el.innerHTML=h}

// ═══ SUPPLEMENT SETTINGS ═══
var suppEditId=null;
function slotLabel(sid){if(!S.plan)return sid;var sl=S.plan.slots.find(function(x){return x.id===sid});return sl?sl.label:sid}
function slotOptions(){if(!S.plan)return'';return S.plan.slots.map(function(sl){return'<option value="'+sl.id+'">'+esc(sl.label)+'</option>'}).join('')}

function renderSuppSettings(){var el=document.getElementById('suppList');if(!el)return;var supps=getSupps();
if(!supps.length){el.innerHTML='<p style="font-size:12px;color:var(--text3)">Henüz takviye eklenmedi.</p>';return}
var h='';supps.forEach(function(s,i){var col=suppColor(s.name);
h+='<div class="supp-settings-item"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span class="supp-dot" style="background:'+col+'"></span><span class="supp-settings-name">'+esc(s.name)+'</span><span style="font-size:11px;color:var(--text3)">×'+s.dose+' '+esc(s.unit)+'</span></div><div class="supp-settings-detail" style="padding-left:14px">'+esc(slotLabel(s.slotId))+(s.note?' — '+esc(s.note):'')+'</div></div><div class="supp-settings-actions"><button onclick="openSuppForm(\''+s.id+'\')" style="color:var(--blue);cursor:pointer;background:none;border:none;font-family:inherit">✎</button><button onclick="deleteSupp(\''+s.id+'\')" style="color:var(--red);cursor:pointer;background:none;border:none;font-family:inherit">×</button></div></div>'});
el.innerHTML=h}

function openSuppForm(id){var fc=document.getElementById('suppFormContainer');if(!fc)return;
if(id==='new'){suppEditId='new';var h='<div class="supp-form"><div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:8px">Yeni Takviye</div>';
h+='<label>Ad</label><input id="sfName" placeholder="ör: Zinc">';
h+='<div class="supp-form-row"><div style="flex:0 0 80px"><label>Doz</label><input id="sfDose" type="number" min="1" value="1"></div><div style="flex:1"><label>Birim</label><input id="sfUnit" value="kapsül" placeholder="kapsül, tablet, damla..."></div></div>';
h+='<label>Öğün</label><select id="sfSlot">'+slotOptions()+'</select>';
h+='<label>Not</label><input id="sfNote" placeholder="ör: yemekle birlikte">';
h+='<div class="supp-form-btns"><button class="btn btn-primary btn-sm" style="flex:1" onclick="saveSupp()">Kaydet</button><button class="btn btn-outline btn-sm" style="flex:1" onclick="closeSuppForm()">İptal</button></div></div>';
fc.innerHTML=h}
else{var s=getSupps().find(function(x){return x.id===id});if(!s)return;suppEditId=id;
var h='<div class="supp-form"><div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:8px">Takviye Düzenle</div>';
h+='<label>Ad</label><input id="sfName" value="'+esc(s.name)+'">';
h+='<div class="supp-form-row"><div style="flex:0 0 80px"><label>Doz</label><input id="sfDose" type="number" min="1" value="'+s.dose+'"></div><div style="flex:1"><label>Birim</label><input id="sfUnit" value="'+esc(s.unit)+'"></div></div>';
h+='<label>Öğün</label><select id="sfSlot">'+slotOptions()+'</select>';
h+='<label>Not</label><input id="sfNote" value="'+esc(s.note||'')+'">';
h+='<div class="supp-form-btns"><button class="btn btn-primary btn-sm" style="flex:1" onclick="saveSupp()">Kaydet</button><button class="btn btn-outline btn-sm" style="flex:1" onclick="closeSuppForm()">İptal</button></div></div>';
fc.innerHTML=h;document.getElementById('sfSlot').value=s.slotId}}

function closeSuppForm(){var fc=document.getElementById('suppFormContainer');if(fc)fc.innerHTML='';suppEditId=null}

function saveSupp(){var name=document.getElementById('sfName').value.trim();if(!name)return;
var obj={name:name,dose:+(document.getElementById('sfDose').value)||1,unit:document.getElementById('sfUnit').value.trim()||'kapsül',slotId:document.getElementById('sfSlot').value,note:document.getElementById('sfNote').value.trim()};
if(suppEditId==='new'){obj.id='supp-'+Date.now();getSupps().push(obj)}
else{var supps=getSupps();for(var i=0;i<supps.length;i++){if(supps[i].id===suppEditId){supps[i]=Object.assign(supps[i],obj);break}}}
saveSupps();closeSuppForm();renderSuppSettings()}

function deleteSupp(id){if(!confirm('Bu takviyeyi silmek istiyor musunuz?'))return;
suppState.supps=getSupps().filter(function(s){return s.id!==id});saveSupps();renderSuppSettings()}

// ═══ ACTIONS ═══
function selDay(d){S.day=d;render()}
function changeWeek(n){S.wk=shiftWK(S.wk,n);render()}
function goToday(){S.wk=todayWK();S.day=todayIdx();render()}
function openSheet(sid){var sl=S.plan.slots.find(function(x){return x.id===sid});if(!sl)return;document.getElementById('sheetTitle').textContent=sl.label+' — Seçenek Seç';var h='',a=W().a;
sl.options.forEach(function(o){var r=remaining(o),av=canUse(o,sid,S.day),ck=S.day+'-'+sid,ia=a[ck]===o.id;
h+='<div class="option-card'+(!av&&!ia?' disabled':'')+'" onclick="assign(\''+sid+'\',\''+o.id+'\')" style="'+(ia?'border-color:var(--green);background:var(--green-soft)':'')+'"><div class="option-card-top"><span class="option-name">'+esc(o.name)+'</span><span class="option-badge'+(r<=0?' zero':'')+'">'+r+'/'+o.maxPerWeek+'</span></div><div class="option-ingredients">'+o.ingredients.map(function(ig){return ig.amount+' '+ig.unit+' '+ig.name+(ig.note?' ('+ig.note+')':'')}).join(', ')+'</div><div class="option-macros"><span class="macro-pill kcal">'+(o.nutrition?o.nutrition.kcal:'?')+' kcal</span><span class="macro-pill p">P '+(o.nutrition?o.nutrition.protein:0)+'g</span><span class="macro-pill c">K '+(o.nutrition?o.nutrition.carb:0)+'g</span><span class="macro-pill f">Y '+(o.nutrition?o.nutrition.fat:0)+'g</span></div>'+(o.recipe?'<div class="slot-note-hint">📖 '+esc(o.recipe)+'</div>':'')+'</div>'});
document.getElementById('sheetBody').innerHTML=h;showSheet()}
function showSheet(){document.getElementById('sheetOverlay').classList.add('open');document.getElementById('sheet').classList.add('open')}
function closeSheet(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('sheet').classList.remove('open')}
function assign(sid,oid){var k=S.day+'-'+sid,w=W();if(w.a[k]===oid)delete w.a[k];else{var sl=S.plan.slots.find(function(x){return x.id===sid}),o=sl?sl.options.find(function(x){return x.id===oid}):null;if(o&&canUse(o,sid,S.day))w.a[k]=oid}save();closeSheet();render()}
function unassign(k){delete W().a[k];save();render()}
function saveNote(k,v){var w=W();if(v.trim())w.n[k]=v.trim();else delete w.n[k];save()}
function autoGrow(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

var curExKey=null;
function openExtraSheet(k){curExKey=k;document.getElementById('sheetTitle').textContent='Ekstra Yiyecek Ekle';var h='';
if(S.savedExtras.length){h+='<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">Kayıtlı Ekstralar</div>';
S.savedExtras.forEach(function(e,i){h+='<div class="saved-extra" onclick="addSaved('+i+')"><div><span class="saved-extra-name">'+esc(e.name)+'</span><br><span class="saved-extra-info">'+e.kcal+' kcal</span></div><span style="color:var(--green);font-weight:800">+</span></div>'});
h+='<div style="height:12px;border-bottom:1px solid var(--border);margin-bottom:12px"></div>'}
h+='<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">JSON ile Ekle</div><textarea id="exJIn" class="import-area" style="min-height:80px" placeholder=\'{"name":"Muz","kcal":105,"protein":1,"carb":27,"fat":0,"fiber":3}\'></textarea><div style="height:8px"></div><button class="btn btn-primary btn-sm" onclick="addExJson()">Ekle</button><div style="height:6px"></div><label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)"><input type="checkbox" id="exSave" checked> Hafızaya kaydet</label><div id="exMsg" style="margin-top:8px"></div>';
document.getElementById('sheetBody').innerHTML=h;showSheet()}
function addExJson(){var raw=document.getElementById('exJIn').value.trim(),msg=document.getElementById('exMsg');if(!raw){msg.innerHTML='<div class="msg msg-err">JSON boş.</div>';return}
try{var d=JSON.parse(raw);if(!d.name)throw new Error('name gerekli');var e={name:d.name,kcal:+d.kcal||0,protein:+d.protein||0,carb:+d.carb||0,fat:+d.fat||0,fiber:+d.fiber||0};
var w=W();if(!w.x[curExKey])w.x[curExKey]=[];w.x[curExKey].push(e);
if(document.getElementById('exSave').checked&&!S.savedExtras.find(function(s){return s.name===e.name}))S.savedExtras.push(Object.assign({id:'ex-'+Date.now()},e));
save();closeSheet();render()}catch(e){msg.innerHTML='<div class="msg msg-err">'+esc(e.message)+'</div>'}}
function addSaved(i){var e=S.savedExtras[i];if(!e||!curExKey)return;var w=W();if(!w.x[curExKey])w.x[curExKey]=[];w.x[curExKey].push({name:e.name,kcal:e.kcal,protein:e.protein,carb:e.carb,fat:e.fat,fiber:e.fiber});save();closeSheet();render()}
function rmExtra(k,i){var w=W();if(w.x[k]){w.x[k].splice(i,1);if(!w.x[k].length)delete w.x[k]}save();render()}
function rmSavedExtra(i){if(!confirm('Silmek istediğinize emin misiniz?'))return;S.savedExtras.splice(i,1);save();renderSavedExtras()}
function openAddSavedExtraSheet(){document.getElementById('sheetTitle').textContent='Kayıtlı Ekstra Ekle';document.getElementById('sheetBody').innerHTML='<textarea id="seJIn" class="import-area" style="min-height:80px" placeholder=\'{"name":"Muz","kcal":105,"protein":1,"carb":27,"fat":0,"fiber":3}\'></textarea><div style="height:8px"></div><button class="btn btn-primary btn-sm" onclick="addSavedJson()">Kaydet</button><div id="seMsg" style="margin-top:8px"></div>';showSheet()}
function addSavedJson(){var raw=document.getElementById('seJIn').value.trim(),msg=document.getElementById('seMsg');try{var d=JSON.parse(raw);if(!d.name)throw new Error('name gerekli');S.savedExtras.push({id:'ex-'+Date.now(),name:d.name,kcal:+d.kcal||0,protein:+d.protein||0,carb:+d.carb||0,fat:+d.fat||0,fiber:+d.fiber||0});save();closeSheet();renderSavedExtras()}catch(e){msg.innerHTML='<div class="msg msg-err">'+esc(e.message)+'</div>'}}

function addWater(d,ml){var w=W();if(!w.w[d])w.w[d]=[];var now=new Date();w.w[d].push({ml:ml,time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')});save();render()}
function rmWater(d,i){var w=W();if(w.w[d]){w.w[d].splice(i,1);if(!w.w[d].length)delete w.w[d]}save();render()}

function importPlan(){var area=document.getElementById('importArea'),msg=document.getElementById('importMsg'),raw=area.value.trim();if(!raw){msg.innerHTML='<div class="msg msg-err">JSON boş olamaz.</div>';return}
try{var d=JSON.parse(raw);if(!d.slots||!Array.isArray(d.slots))throw new Error('slots dizisi eksik');d.slots.forEach(function(s){if(!s.id||!s.label||!Array.isArray(s.options))throw new Error('Slot "'+s.id+'" hatalı');s.options.forEach(function(o){if(!o.id||!o.name||typeof o.maxPerWeek!=='number')throw new Error('Seçenek "'+o.id+'" hatalı')})});
S.plan=d;save();msg.innerHTML='<div class="msg msg-ok">Plan yüklendi! ✓</div>';area.value='';render();setTimeout(function(){goTab('planner')},600)}catch(e){msg.innerHTML='<div class="msg msg-err">Hata: '+esc(e.message)+'</div>'}}
function loadSample(){S.plan=JSON.parse(JSON.stringify(SAMPLE));save();document.getElementById('importMsg').innerHTML='<div class="msg msg-ok">Örnek plan yüklendi! ✓</div>';render();setTimeout(function(){goTab('planner')},600)}
function exportData(){var b=new Blob([JSON.stringify({plan:S.plan,weeks:S.weeks,savedExtras:S.savedExtras,history:S.history,supplements:getSupps(),suppChecked:suppState.checked},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='diyetim-backup.json';a.click()}
function archiveWeek(){if(!S.plan)return alert('Aktif plan yok.');if(!confirm('Bu haftayı arşivlemek istiyor musunuz?'))return;var w=W();S.history.push({week:S.wk,dietitian:S.plan.dietitian,plan:JSON.parse(JSON.stringify(S.plan)),a:JSON.parse(JSON.stringify(w.a)),n:JSON.parse(JSON.stringify(w.n)),x:JSON.parse(JSON.stringify(w.x)),w:JSON.parse(JSON.stringify(w.w)),at:new Date().toISOString()});delete S.weeks[S.wk];save();render();alert('Arşivlendi.')}
function resetWeek(){if(!confirm('Bu haftanın verilerini sıfırlamak istiyor musunuz?'))return;delete S.weeks[S.wk];save();render()}
function clearHist(){if(!confirm('Tüm geçmişi silmek istiyor musunuz?'))return;S.history=[];save();renderHistory()}
function loadHist(i){var h=S.history[i];if(!h||!confirm(h.week+' planını yüklemek istiyor musunuz?'))return;S.plan=h.plan;S.weeks[h.week||todayWK()]={a:h.a||{},n:h.n||{},x:h.x||{},w:h.w||{}};S.wk=h.week||todayWK();save();goTab('planner')}
function toggleDark(){var d=document.body.dataset.theme==='dark';document.body.dataset.theme=d?'light':'dark';localStorage.setItem('dy_dk',d?'0':'1');updateDarkToggle()}
function updateDarkToggle(){var t=document.getElementById('darkToggle');if(t)t.classList.toggle('on',document.body.dataset.theme==='dark')}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
